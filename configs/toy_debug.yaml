seed: 2026
experiment_name: toy_debug
data:
  root: data
  dataset: toy
  max_history: 50
  batch_size: 8
  num_workers: 0
  candidate_strategy: full
model:
  hidden_dim: 128
  num_heads: 4
  depth: 4
  mlp_ratio: 4.0
  dropout: 0.1
  max_history: 50
  num_diffusion_steps: 50
  text_dim: 512
  image_dim: 768
  use_text_condition: true
  use_image_condition: true
  use_history_correction: true
  use_final_correction: true
  text_inject_layers: [1]
  image_inject_layers: [2]
  timestep_dim: 128
  use_user_embeddings: true
training:
  device: cpu
  epochs: 2
  lr: 0.0003
  weight_decay: 0.00001
  grad_clip_norm: 1.0
  denoise_weight: 1.0
  target_recon_weight: 0.5
  prior_weight: 0.0001
  ce_weight: 1.0
  eval_every_epochs: 1
  early_stop_patience: 3
  logit_temperature: 0.7
evaluation:
  topk: [5, 10, 20]
  valid_metric: NDCG@10
  valid_metric_bigger: true
sampling:
  strategy: ddim
  inference_steps: 10
  eta: 0.0
  noise_history: true
logging:
  log_every_steps: 1
  save_train_history: true
ablation:
  name: full
  description: Full multimodal DCDiT toy setting.
