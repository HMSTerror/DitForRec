seed: 2026
experiment_name: beauty_base_v2
data:
  root: data
  dataset: beauty
  max_history: 50
  batch_size: 128
  num_workers: 4
  candidate_strategy: full
model:
  hidden_dim: 256
  num_heads: 8
  depth: 6
  mlp_ratio: 4.0
  dropout: 0.1
  max_history: 50
  num_diffusion_steps: 50
  text_dim: 512
  image_dim: 768
  use_text_condition: true
  use_image_condition: true
  use_history_correction: true
  use_final_correction: true
  text_inject_layers: [2, 4]
  image_inject_layers: [3, 5]
  timestep_dim: 128
  use_user_embeddings: true
training:
  device: cuda
  epochs: 60
  lr: 0.0002
  weight_decay: 0.00001
  grad_clip_norm: 1.0
  denoise_weight: 0.5
  target_recon_weight: 0.25
  prior_weight: 0.0
  ce_weight: 3.0
  eval_every_epochs: 1
  early_stop_patience: 10
  logit_temperature: 0.5
evaluation:
  topk: [5, 10, 20]
  valid_metric: NDCG@10
  valid_metric_bigger: true
  seed: 2026
sampling:
  strategy: ddim
  inference_steps: 20
  eta: 0.0
  noise_history: false
logging:
  log_every_steps: 100
  save_train_history: true
ablation:
  name: tuned_base_v2
  description: Stronger ranking-oriented Beauty setup with larger DiT backbone and deterministic evaluation seed.
